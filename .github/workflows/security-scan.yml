name: DevSecOps Pipeline - Build, Scan, Push

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login (only needed for push later)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build image
      - name: Build Docker image
        run: |
          docker build -t myapp:latest ./app/backend

      # 5. Trivy scan (FAIL ON HIGH/CRITICAL)
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: myapp:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # 6. Tag image (only if scan passes)
      - name: Tag image
        if: success()
        run: |
          docker tag myapp:latest ${{ secrets.DOCKERHUB_USERNAME }}/myapp:secure

      # 7. Push secure image
      - name: Push image
        if: success()
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/myapp:secure
